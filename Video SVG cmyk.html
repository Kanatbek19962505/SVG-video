<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>START - Pro CMYK Honeycomb</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* --- КНОПКА СТАРТ И ИНТРО --- */
        #startBtn {
            padding: 15px 30px;
            font-size: 18px;
            color: #121212;
            background-color: #afca0b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            position: absolute;
            z-index: 100;
        }
        #startBtn:hover { transform: scale(1.05); background-color: #f6a316; }

        #introScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 1s ease-in-out;
        }

        svg { max-width: 90%; max-height: 90vh; }
        svg path, svg circle { transform-box: fill-box; transform-origin: center; opacity: 0; }

        @keyframes fadeAndScale {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0); }
            70% { opacity: 1; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); fill: #fff; }
        }
        .is-animated path.cls-1 { animation: fadeAndScale 1s ease-out forwards; animation-delay: 0.2s; }
        .is-animated path.cls-2 { animation: fadeAndScale 1s ease-out forwards; animation-delay: 0.6s; }
        .is-animated path.cls-3 { animation: fadeAndScale 1s ease-out forwards; animation-delay: 1.5s; }
        .is-animated path.cls-1:last-of-type { animation: fadeAndScale 1s ease-out forwards; animation-delay: 1.7s !important; }
        .is-animated circle { animation: popIn 0.5s ease-out forwards, pulse 3s infinite ease-in-out; }
        .is-animated circle:nth-of-type(1) { animation-delay: 0.8s, 2.0s; }
        .is-animated circle:nth-of-type(2) { animation-delay: 0.9s, 2.1s; }
        .is-animated circle:nth-of-type(3) { animation-delay: 1.0s, 2.2s; }
        .is-animated circle:nth-of-type(4) { animation-delay: 1.1s, 2.3s; }
        .is-animated circle:nth-of-type(5) { animation-delay: 1.2s, 2.4s; }
        .is-animated circle:nth-of-type(6) { animation-delay: 1.3s, 2.5s; }
        .is-animated circle:nth-of-type(7) { animation-delay: 1.4s, 2.6s; }
        .is-animated circle:nth-of-type(8) { animation-delay: 1.5s, 2.7s; }
        .is-animated circle:nth-of-type(n+9) { animation-delay: 1.6s, 2.8s; }

        /* --- ИНТЕРФЕЙС ПРИЛОЖЕНИЯ --- */
        #mainApp {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        .controls-panel {
            background-color: #121212;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 20;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ededed;
            font-size: 14px;
        }

        .btn {
            background-color: #333;
            color: #ededed;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background-color: #555; }
        
        .custom-file-upload {
            background-color: #f6a316;
            color: #121212;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .custom-file-upload:hover { background-color: #afca0b; }
        input[type="file"] { display: none; }
        input[type="range"] { accent-color: #afca0b; cursor: pointer; }

        /* Таймлайн внизу */
        #bottomControls {
            background-color: #121212;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
            color: #ededed;
            font-size: 14px;
            font-family: monospace;
        }

        #progressBar {
            flex-grow: 1;
            height: 6px;
        }

        #canvasContainer {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0e0e0;
            overflow: hidden;
        }

        canvas {
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        video { display: none; }
    </style>
</head>

    <div id="mainApp">
        <div class="controls-panel" id="topControls">
            <label class="custom-file-upload">
                <input type="file" id="videoUpload" accept="video/*">
                Загрузить видео
            </label>
            <button id="playPauseBtn" class="btn">Пауза</button>
            <button id="rewindBtn" class="btn">-5 сек</button>
            <button id="forwardBtn" class="btn">+5 сек</button>
            
            <div class="control-group" style="margin-left: auto;">
                <label>Размер точек (заливка):</label>
                <input type="range" id="dotSizeSlider" min="0.5" max="2.0" step="0.05" value="1.3" style="width: 80px;">
            </div>

            <div class="control-group">
                <label>Плотность (качество):</label>
                <input type="range" id="resSlider" min="30" max="250" value="80" style="width: 100px;">
                <span id="resValue">80</span>
            </div>
            
            <div class="control-group">
                <label>Громкость:</label>
                <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1" style="width: 60px;">
            </div>
        </div>

        <div id="canvasContainer">
            <canvas id="halftoneCanvas"></canvas>
        </div>
        
        <div id="bottomControls">
            <span id="currentTimeDisplay">00:00</span>
            <input type="range" id="progressBar" min="0" max="100" value="0" step="0.1">
            <span id="durationDisplay">00:00</span>
        </div>

        <video id="sourceVideo" playsinline></video>
    </div>

    <script>
        // === ИНТРО И ЗВУКИ ===
        document.getElementById('startBtn').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('logoSvg').classList.add('is-animated');
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            function playSound(delaySeconds, startFreq = 600, endFreq = 200, type = 'sine', duration = 0.1) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime + delaySeconds);
                if(startFreq !== endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + delaySeconds + duration);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime + delaySeconds);
                gain.gain.linearRampToValueAtTime(type==='sine'?0.6:0.15, audioCtx.currentTime + delaySeconds + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delaySeconds + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + delaySeconds);
                osc.stop(audioCtx.currentTime + delaySeconds + duration + 0.05);
            }

            playSound(0.2, 500, 150);
            playSound(0.6, 700, 250);
            let time = 0.8;
            for(let i = 0; i < 9; i++) { 
                for(let j=0; j<5; j++) playSound(time + j*0.035, 4500, 4500, 'sawtooth', 0.03); 
                time += 0.1; 
            }
            playSound(1.5, 900, 300);
            playSound(1.6, 600, 200);

            setTimeout(() => {
                const intro = document.getElementById('introScreen');
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    document.getElementById('mainApp').style.display = 'flex';
                }, 1000);
            }, 3500); 
        });

        // === ОСНОВНАЯ ЛОГИКА ===
        const video = document.getElementById('sourceVideo');
        const canvas = document.getElementById('halftoneCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        const offscreenCanvas = document.createElement('canvas');
        const offCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });
        
        // Элементы управления
        const uploadBtn = document.getElementById('videoUpload');
        const resSlider = document.getElementById('resSlider');
        const dotSizeSlider = document.getElementById('dotSizeSlider');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeDisplay = document.getElementById('currentTimeDisplay');
        const durationDisplay = document.getElementById('durationDisplay');
        
        let animationFrameId;

        // Загрузка
        uploadBtn.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            video.src = URL.createObjectURL(file);
            video.play();
            playPauseBtn.innerText = 'Пауза';
        });

        // Кнопки плеера
        playPauseBtn.addEventListener('click', () => {
            if (!video.src) return;
            if (video.paused) { video.play(); playPauseBtn.innerText = 'Пауза'; renderLoop(); } 
            else { video.pause(); playPauseBtn.innerText = 'Пуск'; }
        });
        document.getElementById('rewindBtn').addEventListener('click', () => { if(video.src) video.currentTime = Math.max(0, video.currentTime - 5); });
        document.getElementById('forwardBtn').addEventListener('click', () => { if(video.src) video.currentTime = Math.min(video.duration, video.currentTime + 5); });
        document.getElementById('volSlider').addEventListener('input', (e) => { video.volume = e.target.value; });
        resSlider.addEventListener('input', (e) => { document.getElementById('resValue').innerText = e.target.value; });

        // Форматирование времени (мм:сс)
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Обновление таймлайна при воспроизведении
        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;
            progressBar.value = (video.currentTime / video.duration) * 100;
            currentTimeDisplay.innerText = formatTime(video.currentTime);
        });

        // Перемотка кликом по таймлайну
        progressBar.addEventListener('input', (e) => {
            if (!video.duration) return;
            video.currentTime = (e.target.value / 100) * video.duration;
        });

        video.addEventListener('loadedmetadata', () => {
            durationDisplay.innerText = formatTime(video.duration);
            adjustCanvasSize();
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            renderLoop();
        });

        function adjustCanvasSize() {
            if(!video.videoWidth) return;
            const container = document.getElementById('canvasContainer');
            const maxWidth = container.clientWidth;
            const maxHeight = container.clientHeight;
            const videoRatio = video.videoWidth / video.videoHeight;
            
            let finalWidth = maxWidth;
            let finalHeight = finalWidth / videoRatio;

            if (finalHeight > maxHeight) {
                finalHeight = maxHeight;
                finalWidth = finalHeight * videoRatio;
            }

            canvas.width = finalWidth;
            canvas.height = finalHeight;
            offscreenCanvas.width = 400; 
            offscreenCanvas.height = 400 / videoRatio;
        }
        window.addEventListener('resize', adjustCanvasSize);

        function drawHexagon(ctx, x, y, r, color) {
            if (r <= 0.2) return; 
            ctx.fillStyle = color;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = i * Math.PI / 3 - Math.PI / 6; 
                const hx = x + r * Math.cos(angle);
                const hy = y + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(hx, hy);
                else ctx.lineTo(hx, hy);
            }
            ctx.fill();
        }

        function renderLoop() {
            if (video.paused || video.ended) {
                if(!video.paused) animationFrameId = requestAnimationFrame(renderLoop);
                return;
            }

            offCtx.drawImage(video, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
            const imgData = offCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height).data;

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'multiply';

            const cols = parseInt(resSlider.value); 
            const hexRadius = (canvas.width / cols) / Math.sqrt(3); 
            const hexWidth = Math.sqrt(3) * hexRadius; 
            const rowHeight = 1.5 * hexRadius;         
            const rows = Math.ceil(canvas.height / rowHeight) + 1;

            const dotScale = parseFloat(dotSizeSlider.value);
            const maxDotRadius = hexRadius * dotScale; 

            // --- АВТОМАТИЧЕСКАЯ РОЗЕТКА ---
            // Идеальное смещение для формирования паттерна без грязи
            const offsetDist = hexRadius * 0.22; 
            const cOffX = -offsetDist; const cOffY = -offsetDist; // Синий: Верх-лево
            const mOffX = offsetDist;  const mOffY = -offsetDist; // Магента: Верх-право
            const yOffX = 0;           const yOffY = offsetDist;  // Желтый: Низ
            // Черный остается по центру

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols + 1; x++) { 
                    let cx = x * hexWidth;
                    let cy = y * rowHeight;
                    if (y % 2 === 1) cx += hexWidth / 2;

                    if (cx > canvas.width + hexWidth || cy > canvas.height + rowHeight) continue;

                    let offX = Math.floor((cx / canvas.width) * offscreenCanvas.width);
                    let offY = Math.floor((cy / canvas.height) * offscreenCanvas.height);
                    offX = Math.min(Math.max(offX, 0), offscreenCanvas.width - 1);
                    offY = Math.min(Math.max(offY, 0), offscreenCanvas.height - 1);
                    
                    const pIdx = (offY * offscreenCanvas.width + offX) * 4;
                    const r = imgData[pIdx];
                    const g = imgData[pIdx + 1];
                    const b = imgData[pIdx + 2];

                    let rNorm = r / 255;
                    let gNorm = g / 255;
                    let bNorm = b / 255;

                    let k = 1 - Math.max(rNorm, gNorm, bNorm);
                    let c = (1 - rNorm - k) / (1 - k) || 0;
                    let m = (1 - gNorm - k) / (1 - k) || 0;
                    let yColor = (1 - bNorm - k) / (1 - k) || 0;

                    // --- ДОМИНИРОВАНИЕ ЦВЕТА (ЯРКОСТЬ) ---
                    // Уменьшаем количество черного на 40%, чтобы очистить тени
                    k = k * 0.6; 
                    
                    // Делаем цвета более "агрессивными" в средних тонах, чтобы они забивали белые дыры
                    c = Math.pow(c, 0.7);
                    m = Math.pow(m, 0.7);
                    yColor = Math.pow(yColor, 0.7);

                    drawHexagon(ctx, cx + yOffX, cy + yOffY, maxDotRadius * yColor, 'rgb(255, 255, 0)'); 
                    drawHexagon(ctx, cx + cOffX, cy + cOffY, maxDotRadius * c, 'rgb(0, 255, 255)'); 
                    drawHexagon(ctx, cx + mOffX, cy + mOffY, maxDotRadius * m, 'rgb(255, 0, 255)'); 
                    drawHexagon(ctx, cx, cy, maxDotRadius * k, 'rgb(0, 0, 0)'); 
                }
            }

            animationFrameId = requestAnimationFrame(renderLoop);
        }
    </script>
